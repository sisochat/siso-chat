<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SISO CHAT</title>

<style>
body {
    font-family: Arial;
    max-width: 700px;
    margin: auto;
    padding: 20px;
}

#chatArea {
    display: none;
}

#messages {
    border: 1px solid #ccc;
    height: 400px;
    overflow-y: auto;
    padding: 10px;
    margin-bottom: 10px;
}

.msg {
    margin: 5px 0;
}

.name {
    font-weight: bold;
    color: blue;
}
</style>
</head>

<body>

<h1>SISO CHAT</h1>

<div id="loginArea">

비밀번호:
<input type="password" id="password">

<br><br>

닉네임:
<input type="text" id="nickname">

<br><br>

<button onclick="enterChat()">
입장
</button>

</div>

<div id="chatArea">

<div id="messages"></div>

<input
    type="text"
    id="messageInput"
    style="width:80%;"
>

<button onclick="sendMessage()">
전송
</button>

</div>

<script type="module">

import {
    initializeApp
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    query,
    orderBy,
    onSnapshot,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";


const firebaseConfig = {
    apiKey: "AIzaSyDW0V33M3wMcC2Yx0YwebnSfZt9BoYfMSA",
    authDomain: "siso-chat.firebaseapp.com",
    projectId: "siso-chat",
    storageBucket: "siso-chat.firebasestorage.app",
    messagingSenderId: "437861157383",
    appId: "1:437861157383:web:1609befaa194fa9047f8a2",
    measurementId: "G-XR53MDET6R"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const PASSWORD = "1234";

let myName = "";

window.enterChat = function() {

    const pw =
        document.getElementById("password").value;

    if (pw !== PASSWORD) {

        alert("비밀번호가 틀렸습니다.");

        return;
    }

    myName =
        document.getElementById("nickname").value;

    if (!myName) {

        alert("닉네임 입력");

        return;
    }

    document.getElementById("loginArea")
        .style.display = "none";

    document.getElementById("chatArea")
        .style.display = "block";

    startListen();
}


window.sendMessage = async function() {

    const text =
        document.getElementById("messageInput")
        .value;

    if (!text) return;

    await addDoc(
        collection(db, "messages"),
        {
            name: myName,
            text: text,
            time: serverTimestamp()
        }
    );

    document.getElementById("messageInput")
        .value = "";
}


function startListen() {

    const q =
        query(
            collection(db, "messages"),
            orderBy("time")
        );

    onSnapshot(q, (snapshot)=>{

        let html = "";

        snapshot.forEach((doc)=>{

            const d = doc.data();

            html +=
            `
            <div class='msg'>
                <span class='name'>
                ${d.name}
                </span>
                :
                ${d.text}
            </div>
            `;

        });

        const box =
            document.getElementById("messages");

        box.innerHTML = html;

        box.scrollTop =
            box.scrollHeight;

    });

}

</script>

</body>
</html>
